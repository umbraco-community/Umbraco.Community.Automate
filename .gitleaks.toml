[extend]
useDefault = true

[[rules]]
id = "google-oauth-client-secret"
description = "Google OAuth 2.0 Client Secret"
regex = '''GOCSPX-[A-Za-z0-9_-]{28}'''
tags = ["google", "oauth", "secret"]

[[rules]]
id = "google-oauth-client-id"
description = "Google OAuth 2.0 Client ID"
regex = '''\d{10,}-[a-z0-9]{32}\.apps\.googleusercontent\.com'''
tags = ["google", "oauth", "client-id"]

# Known, deliberately-retained pre-existing secret: the Demo project's
# Imaging:HMACSecretKey, committed in be847121 (already public on
# origin/main). The repo owner decided not to rotate it or rewrite git
# history, because the demo site it belongs to is a local-only dev scaffold
# that is never deployed publicly. Scoped narrowly to this exact commit,
# file, and rule so it does not mask any other/new finding. See
# docs/superpowers/specs/2026-07-12-secret-scanning-prevention-design.md
# ("Post-implementation notes") for context.
[[allowlists]]
description = "Accepted: Demo project's non-deployed Imaging:HMACSecretKey (commit be847121)"
targetRules = ["generic-api-key"]
condition = "AND"
commits = ["be8471215eb28497a0981d488459b9426405ad89"]
paths = ['''^Umbraco\.Community\.Automate\.Demo/appsettings\.json$''']
